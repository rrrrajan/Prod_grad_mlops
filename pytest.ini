[pytest]
minversion = 8.0

pythonpath = .

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

markers =
    unit: Fast unit tests that do not require external dependencies or model artifacts.
    integration: Tests that validate interaction between multiple components and require artifacts or services.
    e2e: End-to-end tests covering deployment and complete application workflows.
    performance: Performance, load, and benchmarking tests.

addopts =
    -ra
    -v
    --strict-markers
    --cov=src
    --cov=app
    --cov-report=term-missing
    --cov-report=html

filterwarnings =
    ignore:Setting the shape on a NumPy array has been deprecated:DeprecationWarning