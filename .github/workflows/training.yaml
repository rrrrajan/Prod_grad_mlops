name: Model Training Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: training-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

  # MLflow
  MLFLOW_TRACKING_URI: http://127.0.0.1:5000
  MLFLOW_REGISTRY_URI: http://127.0.0.1:5000

  # MySQL
  MYSQL_HOST: 127.0.0.1
  MYSQL_PORT: 3306
  MYSQL_DATABASE: mlflow
  MYSQL_USER: mlflow
  MYSQL_PASSWORD: mlflow

jobs:
  training:
    name: Train & Register Model

    runs-on: ubuntu-latest

    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.4

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mlflow
          MYSQL_USER: mlflow
          MYSQL_PASSWORD: mlflow

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

          pip install \
            mlflow \
            pymysql \
            cloudpickle

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          until mysql \
              -h127.0.0.1 \
              -umlflow \
              -pmlflow \
              -e "SELECT 1;" >/dev/null 2>&1
          do
            echo "Waiting for MySQL..."
            sleep 2
          done

          echo "MySQL is ready."

      - name: Enable MySQL trigger creators
        run: |
          mysql \
            -h127.0.0.1 \
            -uroot \
            -proot \
            -e "SET GLOBAL log_bin_trust_function_creators = 1;"

          mysql \
            -h127.0.0.1 \
            -uroot \
            -proot \
            -e "SHOW VARIABLES LIKE 'log_bin_trust_function_creators';"

      - name: Start MLflow Server
        run: |

          mkdir -p "$GITHUB_WORKSPACE/mlruns"

          nohup mlflow server \
            --backend-store-uri mysql+pymysql://mlflow:mlflow@127.0.0.1:3306/mlflow \
            --default-artifact-root "$GITHUB_WORKSPACE/mlruns" \
            --host 127.0.0.1 \
            --port 5000 \
            > mlflow.log 2>&1 &

      - name: Wait for MLflow Server
        run: |

          timeout 90 bash -c '

          until curl --silent http://127.0.0.1:5000 >/dev/null
          do
            echo "Waiting for MLflow..."
            if [ -f mlflow.log ]; then
                echo "========== Last 50 lines of mlflow.log =========="
                tail -50 mlflow.log
                echo "==============================================="
            fi
            sleep 2
          done

          '

      - name: Check MLflow Process
        run: |
          sleep 5
          ps -ef | grep mlflow || true

      - name: Verify MLflow Server
        run: |
          curl --fail http://127.0.0.1:5000

      - name: Run Training Pipeline
        run: |
          python -m src.pipeline.training

      - name: Download Registered Model
        run: |
          python -m src.pipeline.stage_07_deployment

      - name: Verify Downloaded Deployment Model
        run: |
          echo "Deployment directory:"
          find artifacts/deployment -maxdepth 3

          test -f artifacts/deployment/downloaded_model/MLmodel

      - name: Inspect artifacts before upload
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Repository tree:"
          find . -maxdepth 5

          echo ""
          echo "Artifacts directory:"
          ls -la artifacts || true

          echo ""
          echo "Artifacts contents:"
          find artifacts -maxdepth 6 || true

      - name: Upload Training Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            artifacts/**
            retention-days: 7

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          retention-days: 7
          path: |
            logs/
            artifacts/logs/

      - name: Upload MLflow Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-log
          retention-days: 7
          path: mlflow.log

      - name: Upload MLflow Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          retention-days: 7
          path: mlruns/

  integration-tests:
    name: Integration Tests

    runs-on: ubuntu-latest

    timeout-minutes: 20

    needs: training

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Download Training Artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Inspect Downloaded Artifact
        run: |
          echo "PWD:"
          pwd

          echo ""
          echo "Everything:"
          find . -maxdepth 6

          echo ""
          echo "Directories:"
          find . -type d

          echo ""
          echo "Files:"
          find . -type f | head -200

      - name: Run Training Integration Tests
        run: |
          pytest \
            tests/integration/test_data_ingestion.py \
            tests/integration/test_data_validation.py \
            tests/integration/test_model_trainer.py \
            tests/integration/test_model_evaluation.py \
            tests/integration/test_mlflow_tracker.py \
            tests/integration/test_preprocessor.py \
            -v \
            --cov=src \
            --cov-report=term-missing

      - name: Workflow Summary
        if: always()
        run: |
          {
            echo "## Training Workflow Summary"
            echo ""
            echo "- ✅ MySQL started"
            echo "- ✅ MLflow server started"
            echo "- ✅ Model training completed"
            echo "- ✅ Model evaluated"
            echo "- ✅ Model registered in MLflow Registry"
            echo "- ✅ Training integration tests passed"
            echo "- ✅ Training artifacts uploaded"
          } >> $GITHUB_STEP_SUMMARY
