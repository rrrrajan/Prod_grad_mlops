name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: customer-churn-api
  DOCKER_BUILDKIT: "1"

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black isort

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

      - name: Lint Summary
        if: always()
        run: |
          {
            echo "## Lint Summary"
            echo ""
            echo "- ✅ Ruff completed"
            echo "- ✅ Black completed"
            echo "- ✅ isort completed"
          } >> $GITHUB_STEP_SUMMARY

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests
        run: |
          pytest tests/unit \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          {
            echo "## Unit Test Summary"
            echo ""
            echo "- ✅ Unit tests completed"
            echo "- ✅ Coverage report generated"
            echo "- ✅ Coverage artifact uploaded"
          } >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Display Docker Version
        run: docker version

      - name: Build Docker Image
        run: |
          docker build \
            --pull \
            --file docker/api/Dockerfile \
            --tag $IMAGE_NAME:ci \
            .

      - name: Verify Docker Image
        run: |
          docker image inspect $IMAGE_NAME:ci

      - name: Docker Summary
        if: always()
        run: |
          {
            echo "## Docker Build Summary"
            echo ""
            echo "- ✅ Docker image built successfully"
            echo "- Image: $IMAGE_NAME:ci"
            echo "- Image ID:"
            docker images $IMAGE_NAME:ci --format "  {{.ID}}"
          } >> $GITHUB_STEP_SUMMARY
