artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  raw_data_path: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  local_data_path: artifacts/data_ingestion/data.csv
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv
  preprocessor_object_path: artifacts/data_transformation/preprocessor.pkl
  transformed_train_path: artifacts/data_transformation/transformed_train.npy
  transformed_test_path: artifacts/data_transformation/transformed_test.npy

model_trainer:
  root_dir: artifacts/model_trainer

  train_array_path: artifacts/data_transformation/transformed_train.npy
  test_array_path: artifacts/data_transformation/transformed_test.npy

  trained_model_path: artifacts/model_trainer/model.pkl

  metrics_file_name: artifacts/model_trainer/metrics.json

  model_report_file_name: artifacts/model_trainer/model_report.json

model_evaluation:
  root_dir: artifacts/model_evaluation

  trained_model_path: artifacts/model_trainer/model.pkl

  test_data_path: artifacts/data_transformation/transformed_test.npy

  metrics_file_name: artifacts/model_evaluation/metrics.json

  metadata_file_name: artifacts/model_evaluation/metadata.json

  classification_report_file_name: artifacts/model_evaluation/classification_report.json

  confusion_matrix_json_file_name: artifacts/model_evaluation/confusion_matrix.json

  roc_curve_file_name: artifacts/model_evaluation/roc_curve.png

  confusion_matrix_file_name: artifacts/model_evaluation/confusion_matrix.png
